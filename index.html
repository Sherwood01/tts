<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TTS Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="tag">TTS Demo</p>
        <h1>文字转语音小工具</h1>
        <p class="sub">上传文本或文档，选择引擎，生成可下载的语音。</p>
      </header>

      <section class="card">
        <div class="row">
          <label class="control">
            <span>上传文件</span>
            <input id="fileInput" type="file" accept=".txt,.doc,.docx" />
          </label>
          <button id="clearBtn" class="ghost" type="button">清空</button>
        </div>
        <div class="row">
          <label class="control wide">
            <span>文本内容</span>
            <textarea id="textInput" rows="8" placeholder="这里输入或导入文本..."></textarea>
          </label>
        </div>
        <div class="row meta">
          <div>字符数: <span id="charCount">0</span></div>
          <div id="fileNote" class="note"></div>
        </div>
      </section>

      <section class="card">
        <div class="row">
          <label class="control">
            <span>转换引擎</span>
            <select id="engineSelect">
              <option value="browser">浏览器语音 (Edge/Chrome)</option>
              <option value="model">大模型 TTS (HTTP API)</option>
            </select>
          </label>
          <label class="control">
            <span>语音</span>
            <select id="voiceSelect"></select>
          </label>
          <label class="control">
            <span>语速</span>
            <input id="rateInput" type="range" min="0.6" max="1.4" step="0.1" value="1" />
          </label>
        </div>

        <div id="modelConfig" class="panel">
          <div class="row">
            <label class="control wide">
              <span>Azure 语音</span>
              <input id="azureVoiceInput" type="text" value="zh-CN-XiaoxiaoNeural" />
            </label>
            <label class="control">
              <span>输出格式</span>
              <select id="formatSelect">
                <option value="mp3">mp3</option>
                <option value="wav">wav</option>
                <option value="ogg">ogg</option>
              </select>
            </label>
          </div>
          <p class="note">大模型引擎默认调用 /api/tts (Vercel Serverless)</p>
        </div>

        <div class="row">
          <button id="playBtn" type="button">播放</button>
          <button id="stopBtn" class="ghost" type="button">停止</button>
          <button id="generateBtn" class="accent" type="button">生成语音</button>
        </div>
        <div class="row meta">
          <div id="status">准备就绪</div>
        </div>
      </section>

      <section class="card">
        <h2>输出</h2>
        <audio id="audioPlayer" controls></audio>
        <a id="downloadLink" class="download" href="#" download>下载音频</a>
      </section>
    </main>

    <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
