<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TTS Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="hero">
        <p class="tag">TTS Demo</p>
        <h1>&#x6587;&#x5B57;&#x8F6C;&#x8BED;&#x97F3;&#x5C0F;&#x5DE5;&#x5177;</h1>
        <p class="sub">&#x4E0A;&#x4F20;&#x6587;&#x672C;&#x6216;&#x6587;&#x6863;&#xFF0C;&#x9009;&#x62E9;&#x5F15;&#x64CE;&#xFF0C;&#x751F;&#x6210;&#x53EF;&#x4E0B;&#x8F7D;&#x7684;&#x8BED;&#x97F3;&#x3002;</p>
      </header>

      <section class="card">
        <div class="row">
          <label class="control">
            <span>&#x4E0A;&#x4F20;&#x6587;&#x4EF6;</span>
            <input id="fileInput" type="file" accept=".txt,.doc,.docx" />
          </label>
          <button id="clearBtn" class="ghost" type="button">&#x6E05;&#x7A7A;</button>
        </div>
        <div class="row">
          <label class="control wide">
            <span>&#x6587;&#x672C;&#x5185;&#x5BB9;</span>
            <textarea id="textInput" rows="8" placeholder="&#x8FD9;&#x91CC;&#x8F93;&#x5165;&#x6216;&#x5BFC;&#x5165;&#x6587;&#x672C;..."></textarea>
          </label>
        </div>
        <div class="row meta">
          <div>&#x5B57;&#x7B26;&#x6570;: <span id="charCount">0</span></div>
          <div id="fileNote" class="note"></div>
        </div>
      </section>

      <section class="card">
        <div class="row">
          <label class="control">
            <span>&#x8F6C;&#x6362;&#x5F15;&#x64CE;</span>
            <select id="engineSelect">
              <option value="browser">&#x6D4F;&#x89C8;&#x5668;&#x8BED;&#x97F3; (Edge/Chrome)</option>
              <option value="model" selected>&#x5927;&#x6A21;&#x578B; TTS (Azure)</option>
            </select>
          </label>
          <label class="control">
            <span>&#x8BED;&#x8A00;&#x7B5B;&#x9009;</span>
            <select id="languageFilter"></select>
          </label>
          <label class="control">
            <span>&#x8BED;&#x97F3;&#x7B5B;&#x9009;</span>
            <select id="voiceSelect"></select>
          </label>
        </div>

        <div class="row">
          <button id="refreshVoicesBtn" class="ghost" type="button">&#x5237;&#x65B0;&#x8BED;&#x97F3;&#x5217;&#x8868;</button>
          <label class="control">
            <span>&#x641C;&#x7D22;&#x8BED;&#x97F3;</span>
            <input id="voiceSearch" type="text" placeholder="&#x4F8B;&#x5982; en-US, Xiaoxiao" />
          </label>
          <label id="formatWrap" class="control">
            <span>&#x8F93;&#x51FA;&#x683C;&#x5F0F;</span>
            <select id="formatSelect">
              <option value="mp3">mp3</option>
              <option value="wav">wav</option>
              <option value="ogg">ogg</option>
            </select>
          </label>
        </div>

        <div class="row">
          <label class="control">
            <span>&#x8BED;&#x901F;</span>
            <input id="rateInput" type="range" min="0.6" max="1.4" step="0.1" value="1" />
          </label>
        </div>

        <div class="row">
          <button id="playBtn" class="accent" type="button">&#x64AD;&#x653E;</button>
          <button id="stopBtn" class="ghost" type="button">&#x505C;&#x6B62;</button>
        </div>
        <div class="row meta">
          <div id="playHint">&#x64AD;&#x653E;&#x4F1A;&#x5148;&#x751F;&#x6210;&#x97F3;&#x9891;&#xFF0C;&#x5B8C;&#x6210;&#x540E;&#x53EF;&#x4E0B;&#x8F7D;</div>
        </div>
        <div class="row meta">
          <div class="status-wrap">
            <span id="loadingSpinner" class="spinner" aria-hidden="true"></span>
            <span id="status">&#x51C6;&#x5907;&#x5C31;&#x7EEA;</span>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>&#x8F93;&#x51FA;</h2>
        <audio id="audioPlayer" controls></audio>
        <a id="downloadLink" class="download" href="#" download>&#x4E0B;&#x8F7D;&#x97F3;&#x9891;</a>
      </section>
    </main>

    <div id="loadingOverlay" class="loading-overlay" aria-hidden="true">
      <div class="loading-panel">
        <span class="spinner is-active" aria-hidden="true"></span>
        <span>&#x6B63;&#x5728;&#x751F;&#x6210;&#xFF0C;&#x8BF7;&#x7A0D;&#x5019;...</span>
      </div>
    </div>
    <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
